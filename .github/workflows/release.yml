name: release

# Fully automated releases. On every push to main, python-semantic-release
# inspects the commit history (Conventional Commits) and, when a release is
# warranted (feat -> minor, fix -> patch, breaking -> major), bumps the
# version, updates the changelog, tags vX.Y.Z and creates a GitHub Release.
# A dependent Windows job then builds the exe and attaches it to that release.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.psr.outputs.released }}
      tag: ${{ steps.psr.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # semantic-release needs full history and tags

      - name: Python Semantic Release
        id: psr
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}  # build the just-released version

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Build app
        run: uv run pyinstaller packaging/beat-edl.spec --noconfirm

      - name: Package zip
        run: Compress-Archive -Path dist/beat-edl/* -DestinationPath beat-edl-${{ needs.release.outputs.tag }}-windows.zip

      - name: Attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release.outputs.tag }} beat-edl-${{ needs.release.outputs.tag }}-windows.zip --clobber
