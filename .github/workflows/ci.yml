name: ci

# Fast feedback for pull requests and direct pushes to main: run the test
# suite on Linux. The heavier Windows exe build runs only at release time
# (see release.yml) or on demand (build-windows.yml).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -q
